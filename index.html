<html lang="zh-CN">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fef6f8;--card:#fff;--border:#f0dde2;--text:#5a4a4d;--text2:#9c8088;--accent:#f4a0b0;--hTx:#5a3a40;--hTx2:#8a6068;--tBg:#fef0f2;--tBd:#f8d0d8;--hP1:#f4c8d0;--hP2:#f4a0b0;--shadow:0 1px 4px rgba(0,0,0,.04);--radius:12px;--radius-s:8px}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.container{max-width:1300px;margin:0 auto;padding:14px}
.header{background:linear-gradient(135deg,#f0c0cc,#f8d4de);color:var(--hTx,#5a3a40);border-radius:var(--radius);padding:18px 22px;margin-bottom:14px;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:10px}
.header h1{font-size:20px;font-weight:700}.header .sub{font-size:12px;color:var(--hTx2,#8a6068)}
.header-clock{font-size:22px;font-weight:300}.header-date{font-size:11px;text-align:right}
.header-progress{background:rgba(255,255,255,.4);border-radius:8px;height:6px;margin-top:8px;overflow:hidden}
.header-progress-fill{height:100%;border-radius:8px;background:var(--hP1,#f4c8d0);transition:width .8s;position:relative;overflow:hidden}.header-progress-fill::after{content:"";position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);background-size:200% 100%;animation:shimmer 2s infinite}
.header-progress-label{font-size:11px;color:#8a6068;margin-top:2px;display:flex;justify-content:space-between}
.action-bar{display:flex;gap:6px;margin-bottom:14px}.action-bar button{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-s);padding:5px 14px;cursor:pointer;font-size:12px;color:var(--text)}.action-bar button:hover{border-color:var(--accent)}
#fileInput{display:none}
.progress-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px;margin-bottom:14px}
.prog-card{background:var(--card);border-radius:var(--radius-s);box-shadow:var(--shadow);padding:12px 16px;border-left:4px solid;transition:all .3s}
.prog-card:hover{transform:translateX(4px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.prog-name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;cursor:pointer}
.prog-name-edit{font-size:13px;font-weight:600;background:transparent;border:none;border-bottom:1px dashed var(--accent);outline:none;min-width:60px;color:var(--text)}
.prog-count{font-size:11px;color:var(--text2)}.prog-bar{height:6px;background:#f5e8ec;border-radius:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:6px;transition:width .5s}
.cal-wrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 8px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:6px}
.week-nav h2{font-size:15px;font-weight:600}
.week-nav button{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-s);padding:4px 10px;cursor:pointer;font-size:12px;color:var(--text)}
.cal-scroll{overflow-x:auto;padding:6px 4px}
.cal-table{width:100%;min-width:700px;border-collapse:collapse;table-layout:fixed}
.cal-table th,.cal-table td{border:1px solid var(--border);text-align:center;padding:5px 3px;font-size:12px;vertical-align:top}
.cal-table th{background:#fdf8fa;font-weight:600;padding:7px 3px;white-space:nowrap;color:var(--text2);min-width:36px}
.cal-table .today{background:var(--tBg,#fef0f2);border-color:var(--tBd,#f8d0d8)}
.cal-table .date-num{font-size:13px;font-weight:700}.cal-table .date-dow{font-size:10px;color:var(--text2)}
.cal-table .task-item{display:flex;align-items:center;gap:3px;padding:2px 0;font-size:11px;text-align:left}
.cal-table .task-item input[type=checkbox]{flex-shrink:0;width:13px;height:13px;cursor:pointer;accent-color:var(--accent)}
.cal-table .task-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:transform .2s}
.cal-table .task-item .tname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px;cursor:pointer}
.cal-table .task-item.done .tname{text-decoration:line-through;color:#c0a8ac}
.cal-table .day-progress{font-size:10px;color:var(--text2);margin-top:1px}
.cal-table .day-progress .bar{display:inline-block;height:3px;border-radius:2px;background:#f5e8ec;vertical-align:middle;width:40px;margin-right:3px}
.cal-table .day-progress .fill{height:100%;border-radius:2px;background:var(--accent);transition:width .3s}
.group-label{cursor:pointer}.group-label:hover{opacity:.7}
.month-wrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 20px;margin-bottom:14px}
.month-title{font-size:15px;font-weight:600;margin-bottom:12px}
.month-grids{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:860px){.month-grids{grid-template-columns:1fr}}
.month-card{border:1px solid var(--border);border-radius:var(--radius-s);overflow:hidden}
.month-card h3{font-size:14px;font-weight:600;padding:8px 12px;background:#fdf8fa;border-bottom:1px solid var(--border);text-align:center}
.month-table{width:100%;border-collapse:collapse}
.month-table th{font-size:10px;font-weight:600;color:var(--text2);padding:4px 0;width:14.28%}
.month-table td{font-size:11px;text-align:center;padding:2px 0;vertical-align:top;height:72px;border:1px solid var(--border);position:relative;overflow:hidden}
.month-table td .day-num{font-weight:500;position:absolute;top:2px;left:4px;font-size:11px}
.month-table td .event-bar{position:absolute;left:2px;right:2px;height:11px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:6px;color:#fff;font-weight:600;overflow:hidden;text-overflow:ellipsis;padding:0 2px}
.month-table .today-cell{background:var(--tBg,#fef0f2);border-color:var(--tBd,#f8d0d8)!important}
@media(max-width:768px){.container{padding:10px}.header{padding:14px;flex-direction:column;align-items:flex-start}.cal-table{min-width:560px}.progress-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.progress-grid{grid-template-columns:1fr}.cal-table{min-width:400px}.month-table td{height:56px}}
.color-dot{cursor:pointer;transition:transform .2s}.color-dot:hover{transform:scale(1.3)}

center;justify-content:center;opacity:0;transition:opacity .2s}.deco-card:hover .delD{opacity:1}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.sync-status{font-size:9px;display:flex;align-items:center;gap:4px;margin-top:4px;justify-content:flex-end}
.sync-status .dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
</style></head><body><div class="container" id="app">

</form></div></div>

<script>

if(dd>="2026-07-14"&&dd<="2026-07-18")tl.push({id:"thesis_outline",name:"修改开题大纲",parent:"thesis",grp:"研究生论文初稿"});

var AD=BDT();
function LC(){try{return JSON.parse(localStorage.getItem("sc"))||[]}catch(e){return[]}}function SC(t){try{localStorage.setItem("sc",JSON.stringify(t))}catch(e){}}
function GC(){return"c_"+Date.now()+"_"+Math.random().toString(36).slice(2,6)}
(function(){LC().forEach(function(c){c.id=c.id||GC();for(var d=new Date(c.start);d<=new Date(c.end);d.setDate(d.getDate()+1)){var ds=fmt(d),day=AD.find(function(x){return x.ds===ds});if(day&&!day.tasks.some(function(t){return t.id===c.id}))day.tasks.push({id:c.id,name:c.name||"",parent:"",grp:c.group||"自定义",cat:"custom"})}})})();
var CO=0,CK="s_c",NK="s_n",CLK="s_cl";
